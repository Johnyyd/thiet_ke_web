<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi Tiết Sản Phẩm</title>
    <link rel="stylesheet" type="text/css" href="styleChiTietDanhMuc.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-details">
                <div class="product-preview">
                    <img class="image" src="assets/pexels-hamza01nsr-12562775.jpg" alt="Product Image">
                    <model-viewer class="model model-viewer" src="assets/model/scene.gltf" alt="3D Model" auto-rotate
                        camera-controls>
                    </model-viewer>
                </div>
                <div class="card-info">
                    <p class="text-title">Product Name</p>
                    <p class="text-body">Product Description</p>
                    <p class="text-body">Price: $XX.XX</p>
                    <a href="chiTietDanhMuc.html">
                        <button class="card-button">Add to Cart</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
