<!DOCTYPE html>
<html lang="vn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Dashboard</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <h1>JARVIS</h1>
        <button id="settings-btn" title="Settings">⚙️</button>
    </header>

    <main id="main-content">
        <!-- Login Form -->
        <form id="login-form">
            <h2>Welcome to JARVIS</h2>
            <div id="login-error" class="error"></div>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Dashboard Section -->
        <section id="dashboard-section" style="display:none;">
            <button id="logout-btn">Logout</button>

            <!-- Sidebar Navigation -->
            <nav id="dashboard-nav">
                <!-- Search Bar -->
                <div class="search-container">
                    <input type="text" placeholder="Search Ctrl+K" id="search-input">
                </div>

                <!-- Navigation Tabs -->
                <button class="nav-tab active" data-section="chat">Chat</button>
                <button class="nav-tab" data-section="conversations">Conversations</button>
                <button class="nav-tab" data-section="goals">Goals</button>
                <button class="nav-tab" data-section="insights">Insights</button>
                <button class="nav-tab" data-section="memories">Memories</button>
                <button class="nav-tab" data-section="mood">Mood</button>
                <button class="nav-tab" data-section="news">News</button>
                <button class="nav-tab" data-section="personalities">Personalities</button>
                <button class="nav-tab" data-section="plugins">Plugins</button>
                <button class="nav-tab" data-section="reminders">Reminders</button>
                <button class="nav-tab" data-section="snapshots">Snapshots</button>
                <button class="nav-tab" data-section="suggestions">Suggestions</button>
                <button class="nav-tab" data-section="tasks">Tasks</button>
                <button class="nav-tab" data-section="users">Users</button>
                <button class="nav-tab" data-section="anime3d">3D Anime Assistant</button>
            </nav>

            <!-- Main Content Area -->
            <div id="dashboard-content">
                <!-- Chat Section -->
                <div id="section-chat" class="dashboard-feature">
                    <div id="chat-container">
                        <h2>Chat with JARVIS</h2>
                        <img id="jarvis-avatar" src="./assets/image.jpg" alt="JARVIS Avatar">
                        <div id="chat-loading" style="display:none;">Loading...</div>
                        <div id="chat-history"></div>
                        <form id="chat-form">
                            <input type="text" id="chat-input" placeholder="What do you want to know?"
                                autocomplete="off" required>
                            <button type="button" id="mic-btn" title="Speak">🎤</button>
                            <button type="button" id="tts-btn" title="Read last reply">🔊</button>
                            <button type="submit">Send</button>
                        </form>
                    </div>
                </div>

                <!-- Conversations Section -->
                <div id="section-conversations" class="dashboard-feature" style="display:none;">
                    <h2>Conversations</h2>
                    <div id="conversations-list"></div>
                    <div id="conversation-details" style="display:none;">
                        <h3>Conversation Details</h3>
                        <div id="conversation-info"></div>
                        <button id="delete-conversation-btn">Delete Conversation</button>
                        <button id="export-conversation-btn">Export Conversation</button>
                        <div id="conversation-messages"></div>
                        <form id="reply-form">
                            <textarea id="reply-input" placeholder="Type your reply..." required></textarea>
                            <button type="submit">Reply</button>
                        </form>
                    </div>
                </div>

                <!-- Goals Section -->
                <div id="section-goals" class="dashboard-feature" style="display:none;">
                    <h2>Goals</h2>
                    <canvas id="goals-chart" height="120"></canvas>
                    <div id="goals-progress"></div>
                    <div id="goals-list"></div>
                    <form id="add-goal-form">
                        <input type="text" id="goal-input" placeholder="Add a new goal..." required>
                        <button type="submit">Add Goal</button>
                    </form>
                </div>

                <!-- Insights Section -->
                <div id="section-insights" class="dashboard-feature" style="display:none;">
                    <h2>Insights</h2>
                    <canvas id="insights-chart" height="120"></canvas>
                    <div id="insights-list"></div>
                    <form id="add-insight-form">
                        <input type="text" id="insight-input" placeholder="Add a new insight..." required>
                        <button type="submit">Add Insight</button>
                    </form>
                </div>

                <!-- Memories Section -->
                <div id="section-memories" class="dashboard-feature" style="display:none;">
                    <h2>Memories</h2>
                    <div id="memories-list"></div>
                    <form id="add-memory-form">
                        <textarea id="memory-input" placeholder="Add a new memory..." required></textarea>
                        <button type="submit">Add Memory</button>
                    </form>
                </div>

                <!-- Mood Section -->
                <div id="section-mood" class="dashboard-feature" style="display:none;">
                    <h2>Mood</h2>
                    <canvas id="mood-chart" height="120"></canvas>
                    <div id="mood-list"></div>
                    <form id="add-mood-form">
                        <input type="text" id="mood-input" placeholder="Describe your mood..." required>
                        <button type="submit">Add Mood</button>
                    </form>
                </div>

                <!-- News Section -->
                <div id="section-news" class="dashboard-feature" style="display:none;">
                    <h2>Latest News</h2>
                    <div id="news-list"></div>
                </div>

                <!-- Personalities Section -->
                <div id="section-personalities" class="dashboard-feature" style="display:none;">
                    <h2>Personalities</h2>
                    <div id="personalities-list"></div>
                    <form id="add-personality-form">
                        <input type="text" id="personality-input" placeholder="Add a new personality..." required>
                        <button type="submit">Add Personality</button>
                    </form>
                </div>

                <!-- Plugins Section -->
                <div id="section-plugins" class="dashboard-feature" style="display:none;">
                    <h2>Plugins</h2>
                    <div id="plugin-google-calendar" class="plugin-block">
                        <h3>Google Calendar</h3>
                        <div id="google-calendar-status">Status: <span>Not Connected</span></div>
                        <button id="connect-google-calendar-btn">Connect</button>
                        <button id="disconnect-google-calendar-btn" style="display:none;">Disconnect</button>
                        <div id="google-calendar-events"></div>
                    </div>
                    <div id="plugin-notion" class="plugin-block">
                        <h3>Notion</h3>
                        <div id="notion-status">Status: <span>Not Connected</span></div>
                        <button id="connect-notion-btn">Connect</button>
                        <button id="disconnect-notion-btn" style="display:none;">Disconnect</button>
                        <div id="notion-notes"></div>
                    </div>
                </div>

                <!-- Reminders Section -->
                <div id="section-reminders" class="dashboard-feature" style="display:none;">
                    <h2>Reminders</h2>
                    <div id="reminders-list"></div>
                    <form id="add-reminder-form">
                        <input type="text" id="reminder-input" placeholder="Add a new reminder..." required>
                        <button type="submit">Add Reminder</button>
                    </form>
                </div>

                <!-- Snapshots Section -->
                <div id="section-snapshots" class="dashboard-feature" style="display:none;">
                    <h2>Snapshots</h2>
                    <div id="snapshots-list"></div>
                    <form id="add-snapshot-form">
                        <input type="text" id="snapshot-input" placeholder="Add a new snapshot..." required>
                        <button type="submit">Add Snapshot</button>
                    </form>
                </div>

                <!-- Suggestions Section -->
                <div id="section-suggestions" class="dashboard-feature" style="display:none;">
                    <h2>Suggestions</h2>
                    <div id="suggestions-list"></div>
                    <form id="add-suggestion-form">
                        <input type="text" id="suggestion-input" placeholder="Add a new suggestion..." required>
                        <button type="submit">Add Suggestion</button>
                    </form>
                </div>

                <!-- Tasks Section -->
                <div id="section-tasks" class="dashboard-feature" style="display:none;">
                    <h2>Tasks</h2>
                    <div id="tasks-list"></div>
                    <form id="add-task-form">
                        <input type="text" id="task-input" placeholder="Add a new task..." required>
                        <button type="submit">Add Task</button>
                    </form>
                </div>

                <!-- Users Section -->
                <div id="section-users" class="dashboard-feature" style="display:none;">
                    <h2>Users</h2>
                    <div id="users-list"></div>
                    <form id="add-user-form">
                        <input type="text" id="user-input" placeholder="Add a new user..." required>
                        <button type="submit">Add User</button>
                    </form>
                </div>

                <!-- 3D Anime Assistant Section -->
                <div id="section-anime3d-desktop" class="anime3d-desktop-ui" style="display:none;">
                </div>
            </div>
        </section>

        <!-- Settings Modal -->
        <div id="settings-modal" style="display:none;">
            <div class="modal-content">
                <h2>User Settings</h2>
                <label for="role-select">Role/Personality:</label>
                <select id="role-select">
                    <option value="assistant">Assistant</option>
                    <option value="friend">Friend</option>
                    <option value="advisor">Advisor</option>
                    <option value="coach">Coach</option>
                </select>
                <label>Voice:</label>
                <select id="tts-voice-select">
                    <option value="vi-VN">Việt Nam (Female)</option>
                    <option value="en-US">English US (Female)</option>
                    <option value="anime-char">Anime Character Voice</option>
                </select>
                <label for="tone-select">Tone:</label>
                <select id="tone-select">
                    <option value="friendly">Friendly</option>
                    <option value="formal">Formal</option>
                    <option value="concise">Concise</option>
                    <option value="playful">Playful</option>
                </select>
                <label for="language-select">Language:</label>
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="vi">Vietnamese</option>
                </select>
                <label for="custom-instructions">Custom Instructions:</label>
                <textarea id="custom-instructions" rows="2" placeholder="e.g. Always call me Captain!"></textarea>
                <label for="auto-tts-toggle" style="display:flex;align-items:center;gap:0.5rem;margin-top:1rem;">
                    <input type="checkbox" id="auto-tts-toggle"> Enable auto-TTS for JARVIS replies
                </label>
                <label for="auto-listen-toggle" style="display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;">
                    <input type="checkbox" id="auto-listen-toggle"> Auto-listen for voice input after each JARVIS reply
                </label>
                <button id="save-settings-btn">Save</button>
                <button id="close-settings-btn">Close</button>
            </div>
        </div>
    </main>

    <script type="module">
        import * as THREE from './three/js/three.module.js';
        import { OrbitControls } from './three/js/OrbitControls.js';
        import { FBXLoader } from './three/js/FBXLoader.js';

        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded');
            const waitForViewer = setInterval(() => {

                const container = document.getElementById('viewer-container');
                if (!container) {
                    console.log('Container not found');
                    return;
                }
                clearInterval(waitForViewer);

                console.log('Container found, initializing 3D viewer');

                const scene = new THREE.Scene();
                scene.background = null;

                const width = container.clientWidth;
                const height = container.clientHeight;
                const camera = new THREE.PerspectiveCamera(60, width / height, 0.5, 1000);

                camera.position.set(2.5, 2.5, 5);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);

                document.getElementById('viewer-container').appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;

                const light1 = new THREE.HemisphereLight(0xffffff, 0x444444);
                light1.position.set(0, 20, 0);
                scene.add(light1);

                const light2 = new THREE.DirectionalLight(0xffffff);
                light2.position.set(0, 20, 10);
                scene.add(light2);

                let model = null;
                let mixer = null;
                let fbxAnimations = null;
                let previousAction;
                let activeAction;
                const animationActions = {};
                const clock = new THREE.Clock();
                const shyStart = Date.now();

                const animationNames = [
                    'Idle', 'Happy Idle', 'Excited', 'Silly Dancing', 'Blow A Kiss',
                    'Clapping', 'Talking', 'Rejected', 'Surprised', 'Thankful', 'Kiss', 'Dying'
                ];

                const loadAnimation = (name) => {
                    const path = `./model/ellenJoe/animation/${name}.fbx`;
                    const loader = new FBXLoader();
                    loader.load(path, (anim) => {
                        const clip = anim.animations[0];
                        const action = mixer.clipAction(clip);
                        animationActions[name] = action;

                        if (name === 'Idle') {
                            activeAction = action;
                            activeAction.play();
                        }
                    }, undefined, (err) => {
                        console.error(`Error loading animation ${name}:`, err);
                    });
                };

                const loader = new FBXLoader();
                loader.load('./model/ellenJoe/animation/Idle.fbx', function (object) {
                    model = object;
                    console.log('Model loaded successfully', object);
                    console.log('Model object:', object);

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    const maxDim = Math.max(size.x, size.y, size.z);
                    const fov = camera.fov * (Math.PI / 180);
                    let cameraZ = Math.abs(maxDim / Math.sin(fov / 2));

                    // Tăng thêm 20% khoảng cách để không quá sát
                    cameraZ /= 2.6;

                    camera.position.set(0, maxDim * 0.3, cameraZ);
                    camera.lookAt(0, -maxDim * 2.0, 0);


                    model.position.set(0, -size.y * 1.0, 0);
                    model.scale.set(1.5, 1.5, 1.5);
                    scene.add(model);
                    fbxAnimations = model.animations;

                    if (object.animations && object.animations.length) {
                        mixer = new THREE.AnimationMixer(model);
                        animationNames.forEach(loadAnimation);
                        const action = mixer.clipAction(object.animations[0]);
                        action.play();
                    }

                    animate();
                }, undefined, function (error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.style.color = 'red';
                    errorDiv.style.fontWeight = 'bold';
                    errorDiv.style.padding = '16px';
                    errorDiv.textContent = 'Error loading 3D model: ' + (error?.message || error);
                    document.getElementById('viewer-container').appendChild(errorDiv);
                    alert('Error loading 3D model: ' + (error?.message || error));
                    console.error('Error loading FBX:', error);
                });

                function animate() {
                    requestAnimationFrame(animate);
                    controls.update();

                    const delta = clock.getDelta();
                    if (mixer) mixer.update(delta);

                    if (model) {
                        const t = (Date.now() - shyStart) * 0.001;
                        // animation logic
                    }

                    renderer.render(scene, camera);
                }

                function setAnimation(name) {
                    if (!animationActions[name]) {
                        console.warn(`Animation ${name} not loaded yet`);
                        return;
                    }

                    previousAction = activeAction;
                    activeAction = animationActions[name];

                    if (previousAction !== activeAction) {
                        previousAction.fadeOut(0.3);
                        activeAction.reset().fadeIn(0.3).play();
                    }
                }
                window.setAnimation = setAnimation;

                function playOnceThenIdle(name) {
                    if (!animationActions[name]) {
                        console.warn(`Animation ${name} not loaded`);
                        return;
                    }

                    console.log(`Playing animation: ${name}`);
                    const action = animationActions[name];

                    previousAction = activeAction;
                    activeAction = action;

                    if (previousAction && previousAction !== activeAction) {
                        previousAction.fadeOut(0.2);
                    }

                    action.reset().setLoop(THREE.LoopOnce).fadeIn(0.2).play();
                    action.clampWhenFinished = true;

                    // Khi action kết thúc, tự chuyển về Idle
                    mixer.addEventListener('finished', function onFinished(e) {
                        mixer.removeEventListener('finished', onFinished);
                        setAnimation('Idle');
                    });
                }
                window.playOnceThenIdle = playOnceThenIdle;

                window.addEventListener('resize', () => {
                    const width = container.clientWidth;
                    const height = container.clientHeight;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                });

                document.getElementById('anime3d-chat-form-desktop').addEventListener('submit', function (e) {
                    e.preventDefault();

                    if (mixer && fbxAnimations?.length) {
                        const clip = THREE.AnimationClip.findByName(fbxAnimations, 'Idle') || fbxAnimations[0];
                        const action = mixer.clipAction(clip);
                        action.reset().play();
                    }
                });

                //document.addEventListener('keydown', (e) => {
                //    switch (e.key.toLowerCase()) {
                //        case '1': setAnimation('Happy Idle'); console.log('Happy Idle'); break;
                //        case '2': setAnimation('Excited'); console.log('Excited'); break;
                //        case '3': setAnimation('Silly Dancing'); console.log('Silly Dancing'); break;
                //        case '4': setAnimation('Blow A Kiss'); console.log('Blow A Kiss'); break;
                //        case '5': setAnimation('Clapping'); console.log('Clapping'); break;
                //        case '6': setAnimation('Talking'); console.log('Talking'); break;
                //        case '7': setAnimation('Rejected'); console.log('Rejected'); break;
                //        case '8': setAnimation('Surprised'); console.log('Surprised'); break;
                //        case '9': setAnimation('Thankful'); console.log('Thankful'); break;
                //       case '0': setAnimation('Idle'); console.log('Idle'); break;
                //        case 'q': setAnimation('Kiss'); console.log('Kiss'); break;
                //        case 'w': setAnimation('Dying'); console.log('Dying'); break;
                //        default: console.warn(`No animation mapped for key: ${e.key}`);
                //    }
                //});

                const buttonContainer = document.getElementById('animation-buttons');
                if (buttonContainer) {
                    buttonContainer.querySelectorAll('button').forEach((btn) => {
                        btn.addEventListener('click', () => {
                            const animName = btn.getAttribute('data-anim');

                            if (animName === 'Idle') {
                                setAnimation('Idle');
                            } else {
                                playOnceThenIdle(animName);
                            }
                        });
                    });
                }
                window.setAnimation = setAnimation;
                window.playOnceThenIdle = playOnceThenIdle;
            }, 300);
        });    
    </script>
    <script src="app.js"></script>
</body>

</html>
